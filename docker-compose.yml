services:
  postgres-server:
    image: postgres:18
    container_name: go-postgres-server
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_HOST_PATH}:${POSTGRES_DOCKER_PATH}

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${MIGRATE_HOST_PATH}:${MIGRATE_DOCKER_PATH}
