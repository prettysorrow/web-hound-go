services:
  postgres-server:
    image: postgres:18
    container_name: go-postgres-server
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_DOCKER_PORT}"
    volumes:
      - ${POSTGRES_HOST_PATH}:${POSTGRES_DOCKER_PATH}

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${MIGRATE_HOST_PATH}:${MIGRATE_DOCKER_PATH}
    depends_on:
      - postgres-server

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: pgweb
    ports:
      - ${PGWEB_HOST_PORT}:8081
    environment:
      - PGWEB_DATABASE_URL=${POSTGRES_DOCKER_CONNECTION}
    depends_on:
      - postgres-server
